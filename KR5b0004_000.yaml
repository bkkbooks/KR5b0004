body:
  text: 演太上洞章符第一演太上玄章符第二演太上靈章符第三演太上寶章符第四演太上玉章符第五演太上九章金音符第六演太上玉音三十九章符第七演太上生神章符第八演太上九淪化𨻁章符第九祕符文者太上洞玄隱䇿者也學者佩之於身常詠此九章音真道自降元始天尊言三素者紫素黃素白素是也今各為太上洞玄靈一真人三素合為三真人恆統領今治也經言靈寶法師建齊法服法裙以黃布為裙內著泥丸繒泥丸繒其法上著青橫幅為帔黃綃為巾寒夏不攺易道常以此為法衣常有神男玉女衛之經言法服者若山林幽隱建立齊法其裙褐巾帔等皆以鹿皮製之然不得與世人同齊若在世學者當按經言不得服山學法衣遊出人間人間衣不得入山林且亦違經犯戒諸天大真觀看威儀失法為魔王所笑正神不成玄真不臨前上古之時太妙天真入未得道之時奉修靈寶法不按儀注以山學法衣遊出人間真道垂成於此為一國王家齊遂為此法衣犯戒敗真道後作五嶽真人今故在世間天地小劫數盡此真人得一登劫仞從此真祕戒敗天地九過度運小運訖十其運欲周真人方且遊行靈嶽未得上登十絶從此法衣不按儀科所為也學士愼哉天運小度若訖十者此真人還得為十方數中真入隱也經言又有一法師修學洞玄齊法故未絶跡在世供養寶經治戒修道業巳積時矣誤著世間法衣人山遂不得道也其時復有三玉女衣九蕀繡帔紫絲為帶頭作三環角結上箸蘭生繡巾足著交龍九文之履手把運度靈幡燒丹合九色和香遊戲笑言天運欲盡誰解之哉於此有一上古仙人見此玉女知非常人因頓首作禮玉女初不看視謂言君是上古賢君何忽禮乎玉女因起倣徨不安又有二玉女復來手各持一卷妙經言曰紫微夫人使我持此八條出自天中不與世人相接經文祕不出於此景光真人論數天地大小劫畢恐其後無復種民因造作小劫運度謂契巳可過為真者修學袐之八節日投玉蕳用也景光真人造種民超劫頌旋行過巳周禮涉無為空上至靈雲宿下入淵微宫宅圓方平上思惟寶室鄉度數不乃多天運素言遠時茂元成宫八極常往反三者同一契禮化來何晚六合來往至世祚長髙大金馬光精盛其言將運泰誰跡智慧塗念思元中外網紀一時盡百六數交會周流三素見天帝之所尊過去不成種天地運將翻何緣得過之仰念靈寶言威應可度災握節詠玉篇景光真人時在運度之際告此頌巳方召風伯諸天小天天真來會運期數盡更造立諸小天真人今分形作十天大天尊遊觀五濁靈寶十極真人今正教化經法得真者當作此十方真人其文今雖未得白日飛騰見法後轉輪往作小天真人也元始天尊言小劫者真人三圓竟天天數交地地數普㑹名為小劫運度者也其時諸天日月星宿皆自滅絶諸地梁綱無有根宗爾時三景真君化度衆小聖未得真者特恐今運周也言昔往有玄度一人本從九潜空微中生自然而化光澤顏如少童持八部太上元洞清靜靈寶二素真經八部下登告五嶽鎮往災生禍至安定炎煙乾坤演坐八卦建籙授與太極真人者也開三賢遊戲觀者運度所以過爾一玉女持一卷鎮炎泣川小劫玉字言授晨鄉天人夏禹者也可為衆天教大災之時以往過也上古仙人今作太極主得仙者記名跡也經言真人從無堯之前受重羅天玉女鎮炎注煙小劫妙經於今淪教度身之法其經也流周回綱紀滅山海藏威神至去復來日月食魁𩲃化今巳至元始天尊言太玄有六戊遼淸蕩作應輪轉無極教觀虛遐登髙上崚嶒無崖十絶無立浩浩空逯冥劫移度五星不備宿倒罡翻運周數終日月無光陽澤不和時應失氣乾坤漏泄五嶽淪沒福地泛岡得過陰涼江合為曩者也三界飛行其時人民都悉無餘諸天大真於此鍊過骨合道者記名黃素如是度數盡空洞洞合為空而立大鄉嚮於十絶無崖也北極過去未來大數并於大數入於徵空數空造虛其號難窮太羅真人言道可言道非可常論記言為名亦可非名可謂隱乎處下三者歸於虛大者入遼豁細者達無幽潜行空鄉內煒燁峒宫裹四瀆為洞門曩宅是鍊仙之大鄉也元始太極真人玄度真人於小劫洞門演出運盡之道以記洞之鄉山山有洞天洞天有四門是大洞門也至此門學自得過也太上大道君曰元始天尊言大小劫運盡期度將至道君故自言生名異流種類相乘髙者居其上下者還其底大者反歸止一元為其圓小者定入於細元在內中分形而生或處髙下或入大小中生或根立而生或胎妊懷而生或朔復而生或變化自然而生或在虛無無氣而生初不見形影淪幽而生諸如此類各有福應並從變化皆隨本由其數盡未若有福應多者其度不絶隨類始生若立根生者益其光好與樹七寶之籙生在靈寶國七寶林中衆仙大聖時往觀照大小劫盡周而更化得為人道中修學文㫖自見衆真靈寶光耀普懸十人若是胎化者前生福重得生胎中有形有體魂魄結神自然上皇之辭元始天尊髙上老君於玄都上鄉玉京少室演出太上洞玄靈寶三十六部妙寶上經其時髙上老君以有元虛之算夀無極之數未至上皇世運輪轉祚祿欲交鬱儀代謝結璘旋行髙升劫仞星辰分破列宿更始五嶽變化易更方鎮四瀆蕩除海成山嶽水成巨石蝖飛蠢動一切衆生咸而倏忽度如三十二萬種民元始老君演出五千文道德上下中經三洞真文衆要妙經教化後學其辭曰白石公空姓也於人鳥山奉受學法四十萬言因停此山建齊立直菜素中餐悔念罪福開度一切求脫厄世得見太平朝禮諸天拜謁十方仰謝玄真羅梵衆天八種音聲燒香然燈誦詠旋禮十極念法思惟次遣浮邪論講至妙積學六百歲還玄都武人山北室中復學二百年太歲甲午五月二十四日靈寶應見忽有七寶飛天人十二人乘飛雲之輿從九玄臺下即號位迎太虛元君白石空洞真人飄然飛登上造九霞教化衆仙學真仙之術法至太皇元年九月十日有龜山玉夫人來受八生元籙上經八卷赤松子其年十月五日受大洞寶章三十六部妙經三洞真科道德要戒於玄都寶城山中破金投魚蛟龍結鉤登壇盡一寶信為質用飛雲錦百尺玉札二枚金龍二口魚一雙劎二十四具白素四十尺五方明鏡以度其文時羅梵衆天八種音聲作三契頌受學遂得真仙之道說領劫仞玄洞宫名曰空洞元一君太光君老君太一君所居鄉邑於無崖無淵細微象監魔羅於大千三洞本有太素真科靈衣寶科至妙也一曰空洞真術大洞齊法素靈讃經為頌作羅天玄音洞齊法玉京山經步虛頌梵天音洞神齊法八素隂陽經中夏音大洞齊法絶跡崖隱遠遁世人長齊服食咽元充氣不參世間非其服食長齊流延不同為講十方上聖天尊觀人善惡名曰髙上至真玄妙齊法建齊獨立之道太虛元君於人鳥山奉受太上洞玄梵天威儀羅天大戒悔謝億曽祖考七世父毋生死罪福輸轉胎化之厄願得長居無為燒香燃燈日中一食晝夜六時悔謝前後以來玄祖父毋咸得上登天堂化生十方與玄都同行誦詠三洞真文當爾之時靈寶真人雲光降十極飛天人神男玉女各十許人羅梵衆音七寶光耀煥爛玉京之中誦三契羅天頌十極真人各頌一契梵天頌飛天人神男玉女共贈詩一篇太虛元君即下座禮拜天尊因奉受詩云章靈妙髙真元君以為勝太虛元君於玄中答詩一篇竟奄然不見衆真所向白石公學得真也髙上真人羅天頌三契六度生梵跡至真出虛玄空洞嚮靈霄仰秀十極賔形受奇妙相遼遼造登賢執節侍營枝被褐靈寶晨解散飛雲結耀光照羅天通身黃金體頸有七寶圓足躡蓮華行旋遊十極間玄都邑玉京自然赤字文玉訣非常音法輪是真言妙哉髙上教道建五千文衆經歸首目豁落洞玄真德合超然去塵俗緬飄因右一鬱鬱空洞鄉岧岧天寶臺漻漻衆真降萬劫為一期子抱玉真經吟詠過三災五苦一時迸七祖化無為上造紫微宫元籙方寶持太虛非為遠合鍊吐邪疑軀精濁損次朝禮髙上師右二玄洞空中去虛虛豁無嚮羅天生洞宅十聖俱齊景五嶽得安鎮四瀆慧受象重飛普衢無蓋動無算等九真還丹籙飛行造玉京萬劫倏忽間億載在須頃超度衆根難流霞登濛隴右三道非道非常道名非名非常名空非空非常空玄非玄非常玄故知道玄虛空名自妙也彌綸至濯遼豁無窮上包大羅於無崖下入無淵於細微亦象監魔羅於大千魔羅難察大羅寶真言髙上演教衆真勸化天靈寶玄經至妙之必文度智三十二萬種民三一蕩除百官開度演出真文以化下愚承奉禁忌自蒙度脫苟無其質亦免地獄之災道有五千文至真妙經此為一文大洞三十九章名為一文洞玄靈寶真文玉字羅五上經此是一文三皇內音名為一文龍飛九道名曰得道之跡學士熟看五千文洞玄真文大洞三十九章此經從元始以來祕之金闕至于上元經道欲行掃除清濁戒人罪福通悟流俗至道不遠安在太空大洞三十九章本三十九言髙上老君演作三十九篇以授素黃太虛元君空洞真文積學一千六百二十四日衆仙歸仰真道遂成空洞真八瞻觀六度復演出大劫一卷教化衆仙至經髙妙莫歸於本太真真科髙上科法太素真科太虛元君空洞真袐靈寶玉字洞玄真文初生三十九章玉字所演三十六部妙經經文淵微出自道言諸天真人宗奉赤書觀於梵跡所以真人曰學大乘之業禮拜玉字洞玄真文位證髙真上名梵籙十極真仙展轉超證本為空洞真人亦為十方真人佐理十天梵天名十極真人至真羅天音是名為道東方無極世界虛中之虛妙相真人寶光世界開度虛中一切頌一契髙嶽絶幽嶺中道有妙言羅天空洞章飛造登九玄足躡雲綱行俯眄上皇真奉戒升虗無吟詠靈寶篇南方無極世界空中之空無上真人靈光世界開度空中一切頌一契虛真是玄真至道無為尊元氣訅虛寂龍倒朱鳳翻惟採秀瓊芝奉戒八雲門飛羅戲龍虎願結前世緣訅音仇西方無極世界玄中之玄太浩真人素光世界開度玄中一切頌一契紫微玄中玄獨立體自然瑞相七十二頭光五色圓煥爛照十方飛雲散香煙叉手向梵天得見無極篇北方無極世界無中之無玄籙真人玄光世界開虔無中一切頌一契靈耀空中嚮髙妙何為遠玉晨非質器災害以旋反金門五苦經胎鍊永以斷流珠向上宫億劫豈云晚東北方無極世界玄州上鄉真人開度玄州上鄉無極一切頌一契藹藹洞林肅芬然升太霞鳴玉服天蔭雲氣鬱嵯峨赤界衆道眉長生為辟邪奉嘯黃庭籙得道還度家東南方無極世界彌劫真人淨羅天中開度世界一切頌一契仰觀劫仭鄉玉京玄中虛巍峨赤松子上造如太霞遊沈過衆生太一乘雲輿少樂髙尚法七祖生天居西南方無極世界無量真人鬱羅世界開度無量一切頌一契耀光出大洞真神何徘徊左顧龍衝轡右眄虎吐威朱鳳交觀集螣蛇登大魁九宫生八卦十極遊太微西北方無極世界化生真人波羅光世界開度波羅一切頌一契飛步躡上宫七元長生道願樂一世人騰身避苦惱削除百曾罪徊轉造五老定名玉札篇咸念長自保上方無極世界億億之劫上皇真人九光靈寶世界開度元中一切頌一契太霞觀曾微絶嶽幽中嶺巖選交洞鄉玄州衆仙并遊行三周遇更鍊易光象還期十極真雲行登玉京下方無極世界算數養生真人太一金光世界開度算數一切鬱一契歸道妙中真梵天有靈篇虛無演玉字用以教後賢真人不見形和光氣洞塵玉札奉上皇願以賜要文十篇十方真人造齊用燒香謝文步虛詠明燈祝燈祝願別出衆經太虛元君於是虛皇五年七月七日下遊戲衆