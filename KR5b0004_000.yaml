front:
  text: 洞玄靈寶丹水飛衍運度小劫妙經人四太上大道君曰元始天尊言景光併國大天下劫運盡其景無蓋其光無底不可安止日月不能照列辰不能紀無上無下不可依逮其數難窮道言無上無下彌綸運會輕至於歷無淪入於空玄二者同號思議遼寂回而復同竟而玄圓上鍾於絶頂下人於微塵左逹於蒼浩右通於萬川大羅蓋列斗絶接冥玄都元君靈運旋隱巨嶽巖谷翻然盡并六度既修梵行雙處登諸天關天跡遼豁虛無湛根小運流周運度開元諸天輪轉炎度會期諸地應數亦俱輕翻天髙無極乎洞原天以騫樹正為綱紀地以人鳥住乎炎煙小劫運來上造髙天從天運度不絶幽門於是衆靈記注名曰天地數交小劫巳交也元始天尊度此輪轉巳交之數凡三十六萬劫時行名為小天風度小劫交也大天者有三千九百六十天包於十方諸小天其天各治真人各有十方真人三百年一過旋行此騫樹及人鳥山竟名曰小天運度交小劫周也真人從今天中出之於大天大天有三千九百六十天大劫景光真人禮行此天畢名為小劫運度周也元姑與景光真人言天有百億大天地有百億洞天一天三十六萬劫年行同盡名為小天其天有大洞鄉真人小劫運度周時還其立罡宿五斗七籍魁𩲃始成日月朗明天元新治其時玄度出化經道流應有太靈紫元夫人從靈耀天中出從女飛天人十許人逺尋玄度爾時正在五嶽鎮此炎煙清湯災禍止伏諸凶天人見玄度應於十絶虛空中作禮夫人言往昔上古劫運未交時天尊太真巳見玄降其辭演上古靈寶經部屬卷數藏之於大洞玄鄉中有仙骨者見其經文後有太極真人未得道之時常居世間遊山採藥年七歲遊行至九十歲不殺衆生常修世間諸經老君道德衆經為業通微內究神真普足遊行所至不問幽山深谷林森巖岨絶澗之地後於武人山洞中見元君得道之跡遺八素交帶真文妙經太上洞玄靈寶小劫運數妙經學者自當授子令知天地運數文會百億數盡玄度復降恐大數欲至何可過哉小劫見也元始與玄度真人言數隨百六生於末運其時有仙骨之夫吾自教之度身之法學者當以常求過炎災度煙厄者當學三洞妙經置立靈寶齊法若在人間者當立髙座寶蓋華燈香機朝禮一日六時日中一食若逺棄世務在山林幽谷齊法獨立之道者長齊唯咽氣吞丹常以立坐左手回北極星言某甲日吉時良竪立福田願北極太上度某甲形閉氣三呼六時行此自得道真天運小劫交時玄度真入以此袐文九符度之元始言九符者九章也應太上九策文受靈寶佩此九符水文是洞玄靈章文也誦詠經時佩身丹書素籙回符給囊請帶之以去小劫交祕之也元始天尊演太上洞章符九章
