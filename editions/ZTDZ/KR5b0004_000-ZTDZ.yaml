body:
  text: 演太上洞章符第一演太上玄章符第二演太上靈章符第三演太上寳章符第四演太上玉章符第五演太上九章金音符第六演太上玉音三十九章符第七演太上生神章符第八演太上九淪化𨻁章符第九秘符文者太上洞玄隱䇿者也學者佩之於身常詠此九章音眞道自降元始天尊言三素者紫素黃素白素是也今各爲太上洞玄靈一眞人三素合爲三眞人恒統領今治也經言靈寳法師建齋法服法裙以黃布爲裙内著泥丸繒泥丸繒其法上著青橫幅爲帔黃綃爲巾寒夏不攺易道常以此爲法衣常有神男玉女衛之經言法服者若山林幽隱建立齋法其裙褐巾帔等皆以鹿皮製之然不得與世人同齋若在世學者當按經言不得服山學法衣遊出人間人間衣不得入山林且亦違經犯戒諸天大真觀看威儀失法爲魔王所笑正神不成玄真不臨前上古之時太妙天真入未得道之時奉修靈寳法不按儀注以山學法衣遊出人間眞道垂成於此爲一國王家齋遂爲此法衣犯戒敗眞道後作五嶽眞人今故在世間天地小劫數盡此眞人得一登劫仞從此眞祕戒敗天地九過度運小運訖十其運欲周眞人方且遊行靈嶽未得上登十絕從此法衣不按儀科所爲也學士愼哉天運小度若訖十者此眞人還得爲十方數中眞入隱也經言又有一法師修學洞玄齋法故未絕跡在世供養寳經治戒修道業巳積時矣誤著世間法衣人山遂不得道也其時復有三玉女衣九蕀繡帔紫絲爲帶頭作三環角結上箸蘭生繡巾足著交龍九文之履手把運度靈幡燒丹合九色和香遊戲笑言天運欲盡誰解之哉於此有一上古仙人見此玉女知非常人因頓首作禮玉女初不看視謂言君是上古賢君何忽禮乎玉女因起彷徨不安又有二玉女復來手各持一卷妙經言曰紫微夫人使我持此八條出自天中不與世人相接經文祕不出於此景光眞人論數天地大小劫畢恐其後無復種民因造作小劫運度謂契巳可過爲眞者修學袐之八節日投玉蕳用也景光眞人造種民超劫頌旋行過巳周禮涉無爲空上至靈雲宿下入淵微宫宅圓方平上思惟寳室郷度数不乃多天運素言遠時茂元成宫八極常徃反三者同一契禮化來何晩六合來徃至世祚長髙大金馬光精盛其言將運泰誰跡智慧塗念思元中外網紀一時盡百六数交會周流三素見天帝之所尊過去不成種天地運將翻何縁得過之仰念靈寳言威應可度災握節詠玉篇景光眞人時在運度之際告此頌巳方召風伯諸天小天天眞來會運期數盡更造立諸小天眞人今分形作十天大天尊遊觀五濁靈寳十極眞人今正教化經法得眞者當作此十方眞人其文今雖未得白日飛騰見法後轉輪徃作小天眞人也元始天尊言小劫者眞人三圓竟天天數交地地數普㑹名爲小劫運度者也其時諸天日月星宿皆自滅絶諸地梁綱無有根宗爾時三景眞君化度衆小聖未得眞者特恐今運周也言昔徃有玄度一人本從九潜空微中生自然而化光澤顏如少童持八部太上元洞清静靈寳二素眞經八部下登告五嶽鎭徃災生禍至安定炎煙乾坤演坐八卦建籙授與太極眞人者也開三賢遊戲觀者運度所以過爾一玉女持一卷鎮炎泣川小劫玉字言授晨郷天人夏禹者也可爲衆天教大災之時以徃過也上古仙人今作太極主得仙者記名跡也經言眞人從無堯之前受重羅天玉女鎭炎注煙小刼妙經於今淪教度身之法其經也流周廻綱紀滅山海藏威神至去復來日月食魁𩲃化今巳至元始天尊言太玄有六戊遼淸蕩作應輪轉無極教觀虛遐登髙上崚嶒無崖十絶無立浩浩空逯㝠劫移度五星不備宿倒罡翻運周數終日月無光陽澤不和時應失氣乾坤漏泄五嶽淪没福地汎岡得過陰涼江合爲曩者也三界飛行其時人民都悉無餘諸天大眞於此鍊過骨合道者記名黃素如是度數盡空洞洞合爲空而立大郷嚮於十絕無崖也北極過去未來大數并於大數入於徵空數空造虛其號難窮太羅眞人言道可言道非可常論記言爲名亦可非名可謂隱乎處下三者歸於虛大者入遼豁細者達無幽潜行空郷内煒燁峒宫裹四瀆爲洞門曩宅是鍊仙之大郷也元始太極眞人玄度眞人於小劫洞門演出運盡之道以記洞之鄉山山有洞天洞天有四門是大洞門也至此門學自得過也太上大道君曰元始天尊言大小劫運盡期度將至道君故自言生名異流種類相乘髙者居其上下者還其底大者反歸止一元爲其圓小者定入於細元在內中分形而生或處髙下或入大小中生或根立而生或胎姙懷而生或朔復而生或變化自然而生或在虛無無氣而生初不見形影淪幽而生諸如此類各有福應並從變化皆隨本由其數盡未若有福應多者其度不絕隨類始生若立根生者益其光好與樹七寳之籙生在靈寳國七寳林中衆仙大聖時徃觀照大小劫盡周而更化得爲人道中修學文㫖自見衆眞靈寳光耀普懸十人若是胎化者前生福重得生胎中有形有體魂魄結神自然上皇之辭元始天尊髙上老君於玄都上郷玉京少室演出太上洞玄靈寳三十六部妙寳上經其時髙上老君以有元虛之筭夀無極之數未至上皇世運輪轉祚禄欲交鬱儀代謝結璘旋行髙昇劫仞星辰分破列宿更始五嶽變化易更方鎭四瀆蕩除海成山嶽水成巨石蝖飛蠢動一切衆生咸而倏忽度如三十二萬種民元始老君演出五千文道徳上下中經三洞眞文衆要妙經敎化後學其辭曰白石公空姓也於人鳥山奉受學法四十萬言因停此山建齋立直菜素中餐悔念罪福開度一切求脫厄世得見太平朝禮諸天拜謁十方仰謝玄眞羅梵衆天八種音聲燒香然燈誦詠旋禮十極念法思惟次遣浮邪論講至妙積學六百歳還玄都武人山北室中復學二百年太歲甲午五月二十四日靈寳應見忽有七寳飛天人十二人乗飛雲之輿從九玄臺下即號位迎太虚元君白石空洞眞人飄然飛登上造九霞教化衆仙學眞仙之術法至太皇元年九月十日有龜山玉夫人來受八生元籙上經八卷赤松子其年十月五日受大洞寳章三十六部妙經三洞眞科道德要戒於玄都寳城山中破金投魚蛟龍結鉤登壇盡一寳信爲質用飛雲錦百尺玉札二枚金龍二口魚一雙劎二十四具白素四十尺五方明鏡以度其文時羅梵衆天八種音聲作三契頌受學遂得眞仙之道說領劫仞玄洞宫名曰空洞元一君太光君老君太一君所居郷邑於無崖無淵細微象監魔羅於大千三洞本有太素眞科靈衣寳科至妙也一曰空洞眞術大洞齋法素靈讃經爲頌作羅天玄音洞齋法玉京山經歩虛頌梵天音洞神齋法八素隂陽經中夏音大洞齋法絶跡崖隱遠遯世人長齋服食咽元充氣不參世間非其服食長齋流延不同爲講十方上聖天尊觀人善惡名曰髙上至眞玄妙齋法建齋獨立之道太虛元君於人鳥山奉受太上洞玄梵天威儀羅天大戒悔謝億曽祖考七世父毋生死罪福輸轉胎化之厄願得長居無爲燒香燃燈日中一食晝夜六時悔謝前後以來玄祖父毋咸得上登天堂化生十方與玄都同行誦詠三洞眞文當爾之時靈寳眞人雲光降十極飛天人神男玉女各十許人羅梵衆音七寳光耀煥爛玉京之中誦三契羅天頌十極眞人各頌一契梵天頌飛天人神男玉女共贈詩一篇太虛元君即下座禮拜天尊因奉受詩云章靈妙髙眞元君以爲勝太虛元君於玄中答詩一篇竟奄然不見衆眞所向白石公學得眞也髙上眞人羅天頌三契六度生梵跡至眞出虛玄空洞嚮靈霄仰秀十極賔形受奇妙相遼遼造登賢執節侍營枝被褐靈寳晨解散飛雲結耀光照羅天通身黃金體頸有七寳圓足躡蓮華行旋遊十極間玄都邑玉京自然赤字文玉訣非常音法輪是眞言妙哉髙上教道建五千文衆經歸首目豁落洞玄眞德合超然去塵俗緬飄因右一鬱鬱空洞郷岧岧天寳臺漻漻衆真降萬劫爲一期子抱玉眞經吟詠過三災五苦一時迸七祖化無爲上造紫微宫元籙方寳持太虚非爲遠合鍊吐邪疑軀精濁損次朝禮髙上師右二玄洞空中去虛虛豁無嚮羅天生洞宅十聖俱齋景五嶽得安鎭四瀆慧受象重飛普衢無葢動無筭等九真還丹籙飛行造玉京萬劫倏忽間億載在須頃超度衆根難流霞登濛隴右三道非道非常道名非名非常名空非空非常空玄非玄非常玄故知道玄虛空名自妙也彌綸至濯遼豁無窮上包大羅於無崖下入無淵於細微亦象監魔羅於大千魔羅難察大羅寳眞言髙上演教衆真勸化天靈寳玄經至妙之必文度智三十二萬種民三一蕩除百官開度演出眞文以化下愚承奉禁忌自蒙度脫苟無其質亦免地獄之災道有五千文至眞妙經此爲一文大洞三十九章名爲一文洞玄靈寳眞文玉字羅五上經此是一文三皇内音名爲一文龍飛九道名曰得道之跡學士熟看五千文洞玄眞文大洞三十九章此經從元始以來祕之金闕至于上元經道欲行掃除清濁戒人罪福通悟流俗至道不遠安在太空大洞三十九章本三十九言髙上老君演作三十九篇以授素黃太虛元君空洞眞文積學一千六百二十四日衆仙歸仰眞道遂成空洞眞八瞻觀六度復演岀大劫一卷教化衆仙至經髙妙莫歸於本太眞眞科髙上科法太素眞科太虛元君空洞眞袐靈寳玉字洞玄眞文初生三十九章玉字所演三十六部妙經經文淵微出自道言諸天眞人宗奉赤書觀於梵跡所以眞人曰學大乘之業禮拜玉字洞玄眞文位證髙眞上名梵籙十極眞仙展轉超證本爲空洞眞人亦爲十方眞人佐理十天梵天名十極眞人至眞羅天音是名爲道東方無極世界虚中之虚妙相眞人寳光世界開度虛中一切頌一契髙嶽絕幽嶺中道有妙言羅天空洞章飛造登九玄足躡雲綱行俯眄上皇眞奉戒昇虗無吟詠靈寳篇南方無極世界空中之空無上眞人靈光世界開度空中一切頌一契虚眞是玄眞至道無爲尊元氣訅虛寂龍倒朱鳳翻惟採秀瓊芝奉戒八雲門飛羅戲龍虎願結前世縁訅音仇西方無極世界玄中之玄太浩眞人素光世界開度玄中一切頌一契紫微玄中玄獨立體自然瑞相七十二頭光五色圓煥爛照十方飛雲散香煙叉手向梵天得見無極篇北方無極世界無中之無玄籙眞人玄光世界開虔無中一切頌一契靈耀空中嚮髙妙何爲遠玉晨非質器災害以旋反金門五苦經胎鍊永以斷流珠向上宫億劫豈云晚東北方無極世界玄州上鄉眞人開度玄州上鄉無極一切頌一契藹藹洞林肅芬然昇太霞鳴玉服天蔭雲氣鬱嵯峨赤界衆道眉長生爲辟邪奉嘯黃庭籙得道還度家東南方無極世界彌劫眞人浄羅天中開度世界一切頌一契仰觀劫仭鄉玉京玄中虛巍峨赤松子上造如太霞遊沈過衆生太一乗雲輿少樂髙尚法七祖生天居西南方無極世界無量眞人鬰羅世界開度無量一切頌一契耀光出大洞眞神何徘徊左顧龍衝轡右眄虎吐威朱鳳交觀集螣蛇登大魁九宫生八卦十極遊太微西北方無極世界化生眞人波羅光世界開度波羅一切頌一契飛步躡上宫七元長生道願樂一世人騰身避苦惱削除百曾罪徊轉造五老定名玉札篇咸念長自保上方無極世界億億之劫上皇眞人九光靈寳世界開度元中一切頌一契太霞觀曾微絶嶽幽中嶺巖選交洞郷玄州衆仙并遊行三周遇更鍊易光象還期十極眞雲行登玉京下方無極世界筭數養生眞人太一金光世界開度筭數一切鬱一契歸道妙中眞梵天有靈篇虛無演玉字用以教後賢眞人不見形和光氣洞塵玉札奉上皇願以賜要文十篇十方眞人造齋用燒香謝文步虛詠明燈祝燈祝願別出衆經太虚元君於是虚皇五年七月七日下遊戲衆天看觀善惡見羣精魔鬼交逸天下橫害良民強絶人命太上髙遠三清廣大千妖萬邪假作正眞風雨水旱不應節卦元君出現於人鳥山演出洞玄眞文玉訣妙經分作三十六卷威儀法式安鎭五嶽以察天靈今作十表卦人鳥山浩洞太郷玄洞室中玄尊至寳中教有仙骨之類當見其文隱學思惟奉行其科世間供養別法世經所紀三十六部妙經白石崆峒眞人受三十六萬言本有三十六劵號曰三十六部尊經有三十六卷言字無定經卷首目出大洞大小劫本業妙經其中字天音百神内名是也今出學法所修太虚元君演出中品妙經太虛元君曰經道欲見學者精情感至十位眞人使飛天自授篇目日更新妙動修得眞道飛天人神男玉女頌曰浩浩清霄藻渺渺玄元阿沈紀放自然妙度九天羅絕跡空氣靈千刼不爲多精光普朗瑩洞徹照一軀玉皇髙尊降解脫百曽憂髙上弟子太虚空洞眞人頌曰煥爛無崖跡兤豁虚寂鄉俯眄紫微臺因縁俗形象于持洞章文相與戲玉景天尊飛登眞釋散脫世網眞人曰道有太上清淨元洞眞文玉字妙經太上清淨元洞玉訣羅梵衆音妙經清淨飛行九元洞妙經清淨飛行七生化度元洞妙經清淨元洞靈章上經清淨元洞輪轉五道眞上經清淨元洞玄輪上經清淨元洞三十六壘衆音眞經清淨元洞鳳止妙紀洞眞道跡妙經清淨丹水飛術胡語妙經玉文威儀袐經大度真人無極丈人於劫仞郷日演岀丹水飛訣法授與紫微王夫人夫人作禮奉受十方眞人於此同被極空洞大靈章天道眞文三十六部妙經梵音目録竟眞人等信受奉行丹水飛法用藥十二種絳陵珠子口訣是丹砂白馬玄通口訣是石鐘乳玄微通身口訣是白石英紫度炎光口訣是紫石英黃丞徹身口訣是硫黃玄命益筭口訣是太一禹餘流英月精口訣是雲毋粉青戊還精口訣是白术却毒温身口訣是細辛枯道冬華口訣是茯苓丹侍𦚡口訣是巨勝延年度命口訣是黃精巳上各二十四觔右藥十二種各各自治擣藥必使精好者去人間長齋一百二十四日銅曰擣之草藥各五萬杵石藥各十萬杵治都成并合以銅臼白宻先和擣十二萬杵藥半成以來水銀十二石著銅釡中銅蓋藎之白石英調作泥泥竈竈作兩口屋覆勿使俗人鳥雀雞犬見之薪用栢葉爲大復水銀消盡藥成隂曝百日開之出著金銀玉器中服之齋可服十二九如巨勝大即飄然飛登萬階十方眞八衆天眞人服丹水飛術所得眞也太上老君養生觀化十方觀愚戒頑岀妙文授教衆天大度眞人羅天法師玄極太眞以文法表顯諸天十方靈空眞人以嘉平二十三年九月九日遊刧仞玄都登觀玉景人鳥奉謁太極朝禮太度眞人竟謂問求法下愚緾綿邪濁未敢上陳枯骨含元之始輪轉胎化誤生人道腐臭骨肉比蒙靈澤玄降啓拔有心靈尊髙妙養育群生普度一切此參眞妙蝖飛蠢動咸脱三惡道靈尊未賜枯骨眞文願見其㫖因起作禮經歩七天許時大度眞人湛然不應忽有龜山王夫人從紫霞宫來從玉女十許人至劫仞夫人笑曰有何請求眞人難之道有玄眞上讃丹水飛術妙經八條玄録要文正道畢矣夫人因塗炭叩頭苦請玉女共爾須臾之間眞人出文見授此十方眞人亦於此得文修學今得十方靈寳眞人也洞玄靈寳丹水飛術運度小劫妙經
