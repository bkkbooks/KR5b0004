front:
  text: 洞玄靈寳丹水飛衍運度小劫妙經人四太上大道君曰元始天尊言景光併國大天下劫運盡其景無蓋其光無底不可安止日月不能照列辰不能紀無上無下不可依逮其數難窮道言無上無下彌綸運會輕至於歴無淪入於空玄二者同號思議遼寂廻而復同竟而玄圓上鍾於絶頂下人於微塵左逹於蒼浩右通於萬川大羅蓋列斗絶接㝠玄都元君靈運旋隱巨嶽巖谷翻然盡并六度既修梵行雙處登諸天關天跡遼豁虛無湛根小運流周運度開元諸天輪轉炎度會期諸地應數亦俱輕翻天髙無極乎洞原天以騫樹正爲綱紀地以人鳥住乎炎煙小劫運來上造髙天從天運度不絶幽門於是衆靈記注名曰天地數交小刼巳交也元始天尊度此輪轉巳交之數凡三十六萬劫時行名爲小天風度小劫交也大天者有三千九百六十天包於十方諸小天其天各治眞人各有十方眞人三百年一過旋行此騫樹及人鳥山竟名曰小天運度交小劫周也眞人從今天中出之於大天大天有三千九百六十天大劫景光眞人禮行此天畢名爲小劫運度周也元姑與景光眞人言天有百億大天地有百億洞天一天三十六萬劫年行同盡名爲小天其天有大洞郷眞人小劫運度周時還其立罡宿五斗七籍魁𩲃始成日月朗明天元新治其時玄度出化經道流應有太靈紫元夫人從靈耀天中出從女飛天人十許人逺㝷玄度爾時正在五嶽鎮此炎煙清湯災禍止伏諸凶天人見玄度應於十絶虛空中作禮夫人言徃昔上古劫運未交時天尊太眞巳見玄降其辭演上古靈寳經部屬卷數藏之於大洞玄郷中有仙骨者見其經文後有太極眞人未得道之時常居世間遊山採藥年七歲遊行至九十歲不殺衆生常修世間諸經老君道德衆經爲業通微内究神眞普足遊行所至不問幽山深谷林森巖岨絕澗之地後於武人山洞中見元君得道之跡遺八素交帶眞文妙經太上洞玄靈寳小劫運數妙經學者自當授子令知天地運數文會百億數盡玄度復降恐大數欲至何可過哉小劫見也元始與玄度眞人言數隨百六生於末運其時有仙骨之夫吾自教之度身之法學者當以常求過炎災度煙厄者當學三洞妙經置立靈寳齋法若在人間者當立髙座寳蓋華燈香机朝禮一日六時日中一食若逺棄世務在山林幽谷齋法獨立之道者長齋唯嚥氣吞丹常以立坐左手廻北極星言某甲日吉時良竪立福田願北極太上度某甲形閉氣三呼六時行此自得道眞天運小劫交時玄度眞入以此袐文九符度之元始言九符者九章也應太上九策文受靈寳佩此九符水文是洞玄靈章文也誦詠經時佩身丹書素籙廻符給囊請帶之以去小劫交祕之也元始天尊演太上洞章符九章
